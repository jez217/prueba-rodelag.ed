server {
    listen 80;
    server_name _;

    # Document root points to Slim's public/ directory
    root /var/www/html/public;
    index index.php;

    # Access log in JSON-like format to complement PHP's structured logs
    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    # Route all requests through Slim's front controller
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        # Must match the PHP-FPM service name in docker-compose
        fastcgi_pass  php-fpm:9000;
        fastcgi_index index.php;

        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO       $fastcgi_path_info;

        # Forward real client IP (useful for rate-limiting in Go or logging here)
        fastcgi_param HTTP_X_REAL_IP  $remote_addr;

        # Timeouts — LLM calls can be slow
        fastcgi_read_timeout 60s;
        fastcgi_send_timeout 60s;
    }

    # Deny access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
