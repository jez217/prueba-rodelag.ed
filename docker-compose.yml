# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml  (Module 2.2 — PHP orchestration layer)
#
# Paste this into the root docker-compose.yml that brings up the full stack.
# The full command is:  docker-compose up --build
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── nginx reverse proxy ────────────────────────────────────────────────────
  nginx-php:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - ./php-api/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./php-api/public:/var/www/html/public:ro
    depends_on:
      - php-fpm
    networks:
      - fintech

  # ── PHP-FPM application ────────────────────────────────────────────────────
  php-fpm:
    build:
      context: ./php-api
      dockerfile: Dockerfile
    env_file:
      - ./php-api/.env
    environment:
      JWT_SECRET:     ${JWT_SECRET}
      DB_HOST:        postgres
      DB_PORT:        5432
      DB_NAME:        ${DB_NAME:-fintech}
      DB_USER:        ${DB_USER:-fintech_user}
      DB_PASSWORD:    ${DB_PASSWORD}
      GO_SERVICE_URL: http://go-api:8080
      AI_SERVICE_URL: http://ai-service:8000
      HTTP_TIMEOUT:   10
      LLM_TIMEOUT:    30
      LOG_LEVEL:      info
      APP_ENV:        production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fintech
    restart: unless-stopped

  # ── Supporting services (assumed defined elsewhere in the root compose) ─────
  # postgres, go-api, ai-service — referenced here for clarity

networks:
  fintech:
    driver: bridge
